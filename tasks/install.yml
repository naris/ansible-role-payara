---
#
- name: Download payara
  debug:
    msg: "{{ payara_url }} will be downloaded in {{ payara_home }}"

- name: Install payara
  unarchive:
    src: "{{ payara_url }}"
    dest: "{{ payara_base }}"
    copy: no
    creates: "{{ payara_home }}/bin/asadmin"
    owner: "{{ payara_user }}"
    group: "{{ payara_group }}"
  when: payara_distribution != 'micro'

