---
#
- group:
    name: "{{ payara_group }}"
    state: present

- user:
    name: "{{ payara_user }}"
    group: "{{ payara_group }}"
    home: "{{ payara_base }}"
    shell: /bin/bash
    system: true
    createhome: true
    expires: -1
    state: present

- name: Install unarchive packages
  package: name={{ item }} state=latest
  with_items:
    - unzip
    - tar
